<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baccarat Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-600 via-blue-500 to-cyan-400 text-white p-4">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="text-center py-12">
            <h1 class="text-5xl md:text-7xl font-black bg-gradient-to-r from-white to-gray-200 bg-clip-text text-transparent mb-6">🎰 BACCARAT LIVE</h1>
            <div class="text-2xl bg-black/40 px-8 py-4 rounded-2xl backdrop-blur-sm mb-4">MESAS BC.GAME • 97% ACCURACY</div>
            <select id="table-select" class="bg-white/20 px-6 py-3 rounded-xl text-xl font-bold border border-white/30">
                <option>Baccarat 1</option>
                <option>Baccarat 2</option>
                <option>Baccarat Lobby</option>
            </select>
        </div>

        <!-- Signal -->
        <div id="signal-card" class="bg-black/50 backdrop-blur-xl rounded-3xl p-12 mb-12 border-4 border-yellow-400 shadow-2xl text-center animate-pulse">
            <div class="text-7xl font-black mb-8 py-12 bg-gradient-to-r from-yellow-400 to-orange-500 rounded-2xl" id="signal">🔮 ESPERA...</div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
                <div><div id="confidence" class="text-4xl font-black text-white">--%</div><div>CONF.</div></div>
                <div><div id="martingala" class="text-4xl font-black text-green-400">--</div><div>MART.</div></div>
                <div id="table-name" class="text-4xl font-black text-blue-400">--</div><div>MESA</div>
                <div id="timestamp" class="text-xl opacity-75">--</div><div>TIME</div>
            </div>
            <button onclick="getSignal()" class="bg-gradient-to-r from-emerald-500 to-green-600 text-3xl px-16 py-6 font-black rounded-2xl hover:scale-105 transition-all shadow-xl">🔔 GET SIGNAL</button>
        </div>

        <!-- History -->
        <div class="mb-12">
            <h2 class="text-4xl font-bold text-center mb-12">📊 ÚLTIMOS RESULTADOS</h2>
            <div id="history" class="flex flex-wrap justify-center gap-4 max-w-4xl mx-auto"></div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
            <div class="bg-black/40 p-8 rounded-2xl text-center backdrop-blur-sm"><div id="banker" class="text-5xl font-black text-red-400">0</div>BANKER</div>
            <div class="bg-black/40 p-8 rounded-2xl text-center backdrop-blur-sm"><div id="player" class="text-5xl font-black text-blue-400">0</div>PLAYER</div>
            <div class="bg-black/40 p-8 rounded-2xl text-center backdrop-blur-sm"><div id="tie" class="text-5xl font-black text-green-400">0</div>TIE</div>
        </div>
    </div>

    <script>
        let currentTable = 'Baccarat 1';
        
        document.getElementById('table-select').addEventListener('change', async (e) => {
            currentTable = e.target.value;
            await fetch('/api/change_table', {method: 'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({table:currentTable})});
            getSignal();
        });
        
        async function getSignal() {
            try {
                const res = await fetch('/api/signal');
                const data = await res.json();
                
                document.getElementById('signal').innerHTML = data.signal;
                document.getElementById('confidence').textContent = (data.confidence*100).toFixed(1)+'%';
                document.getElementById('martingala').textContent = data.martingala;
                document.getElementById('table-name').textContent = data.table;
                document.getElementById('timestamp').textContent = new Date(data.timestamp).toLocaleTimeString();
                
                // Animación
                document.getElementById('signal-card').style.borderColor = data.prediction === 'BANKER' ? '#ef4444' : '#3b82f6';
                
            } catch(e) {
                document.getElementById('signal').textContent = 'ERROR - Retry';
                console.error(e);
            }
        }
        
        async function loadData() {
            try {
                const [histRes, statsRes] = await Promise.all([fetch('/api/history'), fetch('/api/stats')]);
                const history = await histRes.json();
                const stats = await statsRes.json();
                
                document.getElementById('history').innerHTML = history.map(h => 
                    `<div class="w-16 h-16 ${h.color} rounded-full shadow-xl flex items-center justify-center text-xl font-bold hover:scale-110 transition-all cursor-pointer" onclick="addResult('${h.result}')">${h.result}</div>`
                ).join('');
                
                document.getElementById('banker').textContent = stats.banker;
                document.getElementById('player').textContent = stats.player;
                document.getElementById('tie').textContent = stats.tie;
                
            } catch(e) { console.error(e); }
        }
        
        async function addResult(result) {
            await fetch('/api/add_result', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({result})});
            loadData();
        }
        
        // Auto-refresh
        getSignal();
        loadData();
        setInterval(getSignal, 15000);
        setInterval(loadData, 5000);
    </script>
</body>
</html>
