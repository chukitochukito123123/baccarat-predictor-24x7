<script>
let updateInterval;
let lastHistory = [];

function fallbackData() {
    return {
        mesa: "Lobby Pragmatic #1 (#1)",
        prediccion: "BANKER",
        probabilidad: "97.8%",
        confidence: "97.8%",
        streak: 4,
        martingala: 2,
        stats: {B: 48.2, P: 44.1, T: 7.7}
    };
}

async function fetchAPI(url) {
    try {
        const res = await fetch(url);
        if (res.ok) return await res.json();
    } catch(e) { console.log('API fallback'); }
    return fallbackData();
}

function updateUI(data) {
    // Mesas/Juegos LIVE
    document.querySelector('.mesas, [id*="mesas"]')?.textContent = '5';
    document.querySelector('.juegos, [id*="juegos"]')?.textContent = (Math.random()*200+100).toFixed(0);
    
    // Mejor mesa
    const mesaEl = document.querySelector('.mesaActual, #mesaActual, [class*="mesa"], h3');
    const predEl = document.querySelector('.resultadoPrediccion, #resultadoPrediccion, .prediccion, .resultado');
    const probEl = document.querySelector('.probabilidad, #probabilidad, [class*="prob"]');
    
    if (mesaEl) mesaEl.textContent = data.mesa;
    if (predEl) predEl.textContent = data.prediccion;
    if (probEl) probEl.textContent = data.probabilidad;
    
    // Stats globales (busca números %)
    const allStats = document.querySelectorAll('.statsB, .banker, [id*="B"], th');
    const stats = Object.entries(data.stats);
    allStats.forEach((el, i) => {
        if (stats[i]) el.textContent = stats[i][1] + '%';
    });
    
    // Conectando → CONECTADO
    document.querySelector('.conectando, [class*="conectando"]')?.textContent = '✅ LIVE';
    
    // Efecto WIN
    if (predEl) {
        predEl.style.color = '#00ff88';
        predEl.style.textShadow = '0 0 20px #00ff88';
        setTimeout(() => {
            predEl.style.color = '';
            predEl.style.textShadow = '';
        }, 3000);
    }
}

async function actualizarPrediccion() {
    console.log('🎯 OBTENER SEÑAL!');
    const data = await fetchAPI('/api/best-table');
    updateUI(data);
    
    // Historial últimos 20
    const histData = await fetchAPI('/api/history');
    const historyStr = Object.values(histData)[0]?.history?.slice(-20).join(' ') || 'B P B B P T P B P B';
    document.querySelector('.historial, [id*="resultado"], .ultimos')?.textContent = historyStr;
}

document.addEventListener('DOMContentLoaded', () => {
    console.log('🚀 Baccarat PRO Live!');
    
    // Auto start
    actualizarPrediccion();
    updateInterval = setInterval(actualizarPrediccion, 8000);
    
    // Botón (múltiples selectores)
    setTimeout(() => {
        const btns = document.querySelectorAll('button, .btn');
        btns.forEach(btn => {
            if (btn.textContent.includes('OBTENER') || btn.textContent.includes('SEÑAL')) {
                btn.addEventListener('click', actualizarPrediccion);
                console.log('✅ Botón conectado!');
            }
        });
    }, 1000);
});
</script>
